# ==========================================
# Production Profile — Hardened Settings
# ==========================================
# Usage: java -jar app.jar --spring.profiles.active=prod
#
# Database credentials: loaded from AWS Secrets Manager via SecretsManagerConfig (base config).
# AWS credentials: resolved via EC2/ECS IAM Role — no config needed here.

server.port=8080
server.shutdown=graceful

# ==================== DataSource (prod overrides) ====================
# SSL required for AWS RDS connections
spring.datasource.hikari.data-source-properties.sslmode=require

# ==================== JPA / Hibernate ====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ==================== Lifecycle ====================
spring.lifecycle.timeout-per-shutdown-phase=30s

# ==================== Actuator (production lockdown) ====================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ==================== Swagger (disabled in production) ====================
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ==================== Logging ====================
logging.level.root=INFO
logging.level.com.dinoventures.wallet=INFO
logging.level.org.hibernate.SQL=WARN

