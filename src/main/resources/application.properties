server.port=8080
server.shutdown=graceful
server.forward-headers-strategy=framework

spring.application.name=wallet-service

spring.config.import=optional:aws-secretsmanager:wallet-service/database

spring.datasource.url=${url:jdbc:postgresql://localhost:5432/wallet_db}
spring.datasource.username=${username:wallet_user}
spring.datasource.password=${password:wallet_secret}

spring.cloud.aws.region.static=us-east-1

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=30000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.lifecycle.timeout-per-shutdown-phase=30s

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

wallet.transaction.max-page-size=100
wallet.transaction.default-page-size=20
wallet.idempotency.ttl-hours=24
wallet.metadata.max-size-bytes=4096
