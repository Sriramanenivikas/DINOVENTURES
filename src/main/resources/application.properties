# ==========================================
# Wallet Service — Local Development Config
# ==========================================

server.port=8080
server.shutdown=graceful

spring.application.name=wallet-service

# ==================== AWS Secrets Manager (loads BEFORE app context starts) ====================
# The secret JSON keys become Spring properties: ${url}, ${username}, ${password}
spring.config.import=optional:aws-secretsmanager:wallet-service/database

# ==================== DataSource (credentials resolved from AWS Secrets Manager) ====================
spring.datasource.url=${url:jdbc:postgresql://localhost:5432/wallet_db}
spring.datasource.username=${username:wallet_user}
spring.datasource.password=${password:wallet_secret}

# ==================== AWS Region ====================
spring.cloud.aws.region.static=us-east-1

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=30000

# ==================== JPA / Hibernate ====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==================== Flyway ====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==================== Lifecycle ====================
spring.lifecycle.timeout-per-shutdown-phase=30s

# ==================== Actuator (security lockdown) ====================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ==================== Swagger / OpenAPI ====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# ==================== Application Config ====================
wallet.transaction.max-page-size=100
wallet.transaction.default-page-size=20
wallet.idempotency.ttl-hours=24
wallet.metadata.max-size-bytes=4096
