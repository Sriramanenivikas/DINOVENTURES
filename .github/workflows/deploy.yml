name: Build & Deploy Wallet Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "--- Pulling latest image ---"
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            docker pull ghcr.io/${{ secrets.GHCR_USER }}/dinoventures:latest

            echo "--- Stopping old container ---"
            docker stop wallet-service 2>/dev/null || true
            docker rm wallet-service 2>/dev/null || true

            echo "--- Starting new container ---"
            docker run -d \
              --name wallet-service \
              -p 8080:8080 \
              -e AWS_REGION=us-east-1 \
              --restart unless-stopped \
              ghcr.io/${{ secrets.GHCR_USER }}/dinoventures:latest

            echo "--- Waiting for health check ---"
            sleep 20
            curl -sf http://localhost:8080/actuator/health || echo "Health check failed!"

            echo "--- Cleaning old images ---"
            docker image prune -f
